<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистър на риболовни кораби · ИАРА</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>" />
</head>
<body>
  <div id="nav-root"></div>

  <!-- Page header -->
  <section class="page-hero photo ph-korabi">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Начало</a> / <span>Регистър на кораби</span></div>
      <div class="flex between items-center wrap" style="gap:20px">
        <div>
          <h1>Регистър на риболовни кораби</h1>
          <p>Всеки кораб с право да лови риба в българската акватория е вписан тук — с идентификация, собственик, капитан и технически параметри.</p>
        </div>
        <div class="flex gap-2 wrap">
          <button class="btn btn-light" id="editToggle">✎ Редактиране</button>
          <button class="btn btn-light" id="addBtn">+ Добави кораб</button>
        </div>
      </div>
      <div class="page-stats">
        <div class="ps"><b id="st-total">—</b><span>Общо кораби</span></div>
        <div class="ps"><b id="st-active">—</b><span>Активни</span></div>
        <div class="ps"><b id="st-traulers">—</b><span>Траулери</span></div>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:40px">
    <div class="container">
      <div class="toolbar">
        <div class="search">
          <span id="searchIco"></span>
          <input type="text" id="search" placeholder="Търси по име, номер, собственик или капитан…" />
        </div>
        <div class="chips" id="chips">
          <button class="chip active" data-f="all">Всички</button>
          <button class="chip" data-f="активен">Активни</button>
          <button class="chip" data-f="спрян">Спрени</button>
          <button class="chip" data-f="Траулер">Траулери</button>
          <button class="chip" data-f="Сейнер">Сейнери</button>
        </div>
      </div>

      <div class="flex between items-center" style="margin-bottom:16px">
        <span class="count" id="count">Зареждане…</span>
      </div>

      <div class="records cols-2" id="list">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <!-- Modal: add vessel -->
  <div class="modal-overlay" id="addKorab">
    <div class="modal">
      <div class="modal-head">
        <h3 id="korabModalTitle">➕ Нов риболовен кораб</h3>
        <button class="modal-close" onclick="closeModal('addKorab')">✕</button>
      </div>
      <form id="korabForm">
        <div class="modal-body">
          <div class="form-row">
            <div class="field"><label>Име на кораба *</label><input name="ime" required placeholder="напр. Свети Никола" /></div>
            <div class="field"><label>Тип</label>
              <select name="tip"><option>Траулер</option><option>Сейнер</option><option>Крайбрежна лодка</option><option>Друг</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="field"><label>Международен номер (IMO/CFR) *</label><input name="mejdunaroden_nomer" required placeholder="BGR000000000" /></div>
            <div class="field"><label>Позивна</label><input name="pozivna" placeholder="LZ0000" /></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Външна маркировка</label><input name="markirovka" placeholder="BS-0000" /></div>
            <div class="field"><label>Пристанище на регистрация</label><input name="pristanishte" placeholder="Бургас" /></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Собственик *</label><input name="sobstvenik" required placeholder="Фирма или физическо лице" /></div>
            <div class="field"><label>Капитан</label><input name="kapitan" placeholder="Име на капитана" /></div>
          </div>
          <h4 style="margin:8px 0 4px;color:var(--muted);font-size:.85rem;text-transform:uppercase;letter-spacing:.05em">Технически параметри</h4>
          <div class="form-row">
            <div class="field"><label>Дължина (м)</label><input name="dalzhina" type="number" step="0.1" placeholder="18.4" /></div>
            <div class="field"><label>Широчина (м)</label><input name="shirina" type="number" step="0.1" placeholder="5.2" /></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Тонаж (БТ)</label><input name="tonaj" type="number" step="1" placeholder="42" /></div>
            <div class="field"><label>Газене (м)</label><input name="gazene" type="number" step="0.1" placeholder="2.1" /></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Мощност на двигателя (кW)</label><input name="moshtnost" type="number" step="1" placeholder="240" /></div>
            <div class="field"><label>Гориво</label>
              <select name="gorivo"><option>Дизел</option><option>Бензин</option><option>Хибрид</option></select>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn btn-ghost" onclick="closeModal('addKorab')">Отказ</button>
          <button type="submit" class="btn btn-primary">Запиши в регистъра</button>
        </div>
      </form>
    </div>
  </div>

  <div id="footer-root"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/korabi.js"></script>
</body>
</html>
